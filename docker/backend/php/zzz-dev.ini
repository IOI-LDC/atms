; ===========================================================================
; DEV ONLY — mounted via compose.override.yaml over the production zz-atms.ini.
;
; Re-enables per-request file stat-ing so backend changes are picked up
; immediately during development without restarting the api container.
; The file loads AFTER zz-atms.ini (sorted alphabetically: zz- < zzz-) so
; these values win in dev.
;
; DO NOT mount this file in production — see docker/backend/php/zz-atms.ini.
; ===========================================================================

; Re-check file timestamps on every request for hot reload during dev.
opcache.validate_timestamps = 1
opcache.revalidate_freq = 0
