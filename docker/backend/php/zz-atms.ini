; ===========================================================================
; Production PHP / OPcache tuning — loaded LAST (zz- prefix) to override defaults.
;
; Target host: 6 vCPU / 12 GB RAM / 100 GB NVMe.
;
; The single highest-impact line here is opcache.validate_timestamps = 0.
; In production Laravel resolves hundreds of PHP files per request; with the
; default (1) PHP stat()s every file on every request. Disabling it typically
; yields 20–40% throughput improvement.
;
; Safety note: with validate_timestamps=0, code changes are NOT picked up
; until OPcache is cleared or the container restarts. This is safe because
; production deploys rebuild the Docker image and start a fresh container
; (empty OPcache). For local dev, compose.override.yaml mounts a small
; override ini that re-enables timestamp validation for hot reload.
; ===========================================================================

; --- Realpath cache (resolves many file paths per request) ---
realpath_cache_size = 4096K
realpath_cache_ttl = 600

; --- Memory ---
; 256 MB matches Laravel's recommended ceiling for a single request.
; Workers average far less (~40–60 MB), but ERP sync / large reports may spike.
memory_limit = 256M

; --- OPcache ---
opcache.enable = 1
; CLI stays off — long-running queue workers cache classes in-process anyway,
; and enabling CLI OPcache can mask stale-code issues during partial deploys.
opcache.enable_cli = 0
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 16
; 20 000 is comfortably above a typical Laravel app's file count (~8 000–12 000).
opcache.max_accelerated_files = 20000
; Production: never stat files. Fresh image on each deploy = fresh cache.
opcache.validate_timestamps = 0
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1
; Comments are required by some packages (e.g. annotation readers).
opcache.save_comments = 1
opcache.enable_file_override = 1
