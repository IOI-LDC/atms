; ===========================================================================
; PHP-FPM pool tuning for production.
;
; Target host: 6 vCPU / 12 GB RAM / 100 GB NVMe.
;
; Sizing rationale:
;   - pm.max_children = 35  →  peak ~35 concurrent PHP requests.
;     At ~60 MB/worker that is ~2.1 GB peak RAM for PHP-FPM, leaving the bulk
;     of the 12 GB for PostgreSQL (shared_buffers) and the OS page cache.
;   - pm.max_requests = 500 →  workers are recycled to release leaked memory
;     (defence-in-depth; Laravel itself is clean, but long-running workers and
;     third-party packages may not be).
;   - listen / user / group are intentionally NOT set here — they are provided
;     by docker.conf (listen=9000) and the image default. This file only
;     overrides the process-manager settings.
;
; This file REPLACES /usr/local/etc/php-fpm.d/www.conf in the Docker image
; (see docker/backend/Dockerfile). It loads first; docker.conf and zz-docker.conf
; apply on top but do not touch pm settings.
; ===========================================================================

[www]
user = www-data
group = www-data
pm = dynamic
pm.max_children = 35
pm.start_servers = 8
pm.min_spare_servers = 4
pm.max_spare_servers = 12
pm.max_requests = 500
pm.process_idle_timeout = 10s

; Optional monitoring endpoints — accessible only inside the Docker network
; (nginx never exposes these paths). Useful for `docker compose exec api ...`.
pm.status_path = /fpm-status
ping.path = /fpm-ping
