services:
  api:
    volumes:
      - ./backend:/var/www/html
      - attachments:/var/www/html/storage/app/attachments
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  nginx:
    volumes:
      - ./docker/backend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro

  queue:
    volumes:
      - ./backend:/var/www/html
      - attachments:/var/www/html/storage/app/attachments
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

  scheduler:
    volumes:
      - ./backend:/var/www/html
      - attachments:/var/www/html/storage/app/attachments
    environment:
      APP_ENV: local
      APP_DEBUG: "true"

